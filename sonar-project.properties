# SonarQube project configuration
# These settings are picked up by `mvn sonar:sonar` and by sonar-scanner CLI.
# Sensitive values (host URL, token) must be supplied via environment variables
# or GitHub Secrets — never hardcode them here.

sonar.projectKey=webapp
sonar.projectName=Sample Java Web Application
sonar.projectVersion=1.0

# Source and binary paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# JaCoCo coverage report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate: fail if the gate is not passed (enforced in the workflow via
# the `sonar.qualitygate.wait=true` flag passed at scan time)
sonar.qualitygate.wait=true
